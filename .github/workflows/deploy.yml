name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run build
      - name: TDD site audit (SEO / structure / CRO / leak gate)
        run: node audit.mjs
      - name: Install Chromium for contrast gate
        run: npx playwright install --with-deps chromium
      - name: Contrast / visibility gate (axe colour-contrast on CTAs + headings)
        run: |
          npm run preview &
          timeout 60 sh -c 'until curl -sf http://localhost:4321 >/dev/null; do sleep 1; done'
          npm run a11y
  build:
    needs: audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install + Build
        uses: withastro/action@v3
        with:
          node-version: 22
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
